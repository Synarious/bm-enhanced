name: Build and Deploy

on:
  push:
    branches:
      - '*' # Triggers on push to any branch

jobs:
  build-and-commit:
    if: github.repository != 'Synarious/bm-enhanced'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🚀 Run build script
      # This single command now does all the work!
      run: node minify.js

    - name: ✨ Commit and push changes
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "GitHub Actions"
        git add builds/source.min.js builds/source-custom.js builds/tampermonkey_userscript/bm-enhanced.min.js builds/chrome_extension/content.js builds/chrome_extension/manifest.json
        if ! git diff --staged --quiet; then
          git commit -m "build: Minify JS and update versions [skip ci]"
          git push
        else
          echo "No changes to commit."
        fi